kind = "web"
previewPath = "/"
title = "Manas — The Gym for Your Mind"
version = "1.0.0"
id = "artifacts/manas-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19124

[services.development]
run = "pnpm --filter @workspace/manas-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manas-site", "run", "build" ]
publicDir = "artifacts/manas-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19124"
BASE_PATH = "/"
